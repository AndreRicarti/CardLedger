name: CD

on:
  push:
    branches: ["master"]

jobs:
  publish-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tag
        run: echo "IMAGE_TAG=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/cardledger-api:latest" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./CardLedger
          file: ./CardLedger/Dockerfile
          push: true
          tags: ${{ env.IMAGE_TAG }}
